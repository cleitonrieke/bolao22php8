server {
    listen 80;
    listen [::]:80;
    server_name bolaocopabrothers26.online
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass bolao26:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    location / {
        try_files $uri /index.php?$query_string;
        gzip_static on;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bolaocopabrothers26.online;

    # Direcionamento para a pasta dos arquivos do seu site
    root /var/www/public;
    index indexp.php index.html index.htm;

    # Certificados gerados pelo Certbot
    ssl_certificate /etc/nginx/ssl/bolaocopabrothers26.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/bolaocopabrothers26.online/privkey.pem;

    # Protocolos de segurança TLS modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Configuração das rotas do seu App (Modificada para index.php)
    location / {
        try_files $uri /index.php?$query_string;
        gzip_static on;
    }

    # Processamento dos arquivos PHP direcionados ao bolao26
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass bolao26:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
